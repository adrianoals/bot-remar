services:
  remar-bot:
    build: .
    container_name: remar-chatbot
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
      - LOG_LEVEL=INFO
      - LOG_JSON=1
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      # Sincroniza o horário do container com o do host (bom para logs)
      - /etc/localtime:/etc/localtime:ro
