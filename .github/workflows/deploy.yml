name: CI-CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          MEGA_API_URL: "https://example.megaapi.local"
          MEGA_API_INSTANCE_KEY: "ci-instance"
          MEGA_API_TOKEN: "ci-token"
          SUPABASE_URL: "https://example.supabase.co"
          SUPABASE_KEY: "ci-supabase-key"
        run: python -m unittest discover -s tests -p "test_*.py" -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e
            cd /opt/remar
            git fetch --all
            git checkout main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker compose ps
            for i in {1..24}; do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
                echo "Local healthcheck OK"
                break
              fi
              echo "Aguardando app subir... tentativa $i/24"
              sleep 5
            done
            curl -fsS http://127.0.0.1:8000/health >/dev/null

      - name: Smoke test (optional)
        env:
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        if: ${{ env.APP_HEALTHCHECK_URL != '' }}
        run: |
          for i in {1..12}; do
            if curl -fsS "$APP_HEALTHCHECK_URL" >/dev/null; then
              echo "External healthcheck OK"
              exit 0
            fi
            echo "Aguardando endpoint externo... tentativa $i/12"
            sleep 5
          done
          echo "Falha no healthcheck externo: $APP_HEALTHCHECK_URL"
          exit 1
